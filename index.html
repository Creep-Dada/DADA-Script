  --bg2: #161b22;

  --border: #2d3646;
  --text: #e6edf3;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  font-family: "Segoe UI", system-ui, sans-serif;

  padding-bottom: 90px;
}
header {
  background: linear-gradient(180deg, #161b22, #0d1117);

}
header h1 {
  font-size: 1.7rem;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}
header h1 span { color: var(--text); }
header p.sub { color: var(--dim); margin-top: 4px; font-size: .95rem; }
.steps { display: flex; gap: 18px; margin-top: 12px; flex-wrap: wrap; }
.steps div {

.steps b { color: var(--accent2); margin-right: 6px; }
main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

}
.globals { display: flex; gap: 26px; flex-wrap: wrap; align-items: center; }

.globals label { color: var(--dim); font-size: .9rem; }
input[type="text"] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 5px 9px; font-size: .9rem;
}
input.ver { width: 44px; text-align: center; }
input.wide { width: 240px; }
select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;

.switch { position: relative; display: inline-flex; flex: 0 0 auto; width: 42px; height: 24px; vertical-align: middle; }
.switch input { position: absolute; inset: 0; width: 100%; height: 100%; margin: 0; opacity: 0; cursor: pointer; }
.switch .knob { pointer-events: none; position: absolute; inset: 0; background: #39424f; border-radius: 999px; transition: .15s; }
.switch .knob::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #e8edf3; border-radius: 50%; transition: .15s; }
.switch input:checked + .knob::before { transform: translateX(18px); }
.switch input:disabled { cursor: not-allowed; }
.switch input:disabled + .knob { opacity: .35; }
/* Varianten: Master = orange (Seite ins Script), Preset = grün (Startzustand) */
.switch--master input:checked + .knob { background: var(--accent); }
.switch--preset input:checked + .knob { background: var(--ok); }
[dir=rtl] .switch input:checked + .knob::before { transform: translateX(-18px); }
/* Status-Text neben Schaltern */
.statetxt { font-size: .72rem; font-weight: 700; letter-spacing: .5px; min-width: 34px; }
.statetxt.is-on { color: var(--ok); }
.statetxt.is-off { color: var(--dim); }
.switch--master ~ .statetxt.is-on, .masterwrap .statetxt.is-on { color: var(--accent); }

.hdrbar { position: absolute; top: 16px; inset-inline-end: 24px; display: flex; gap: 10px; align-items: center; }
.hdrbar .globe { font-size: 1.15rem; }
#langSel { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 6px 8px; font-size: .9rem; cursor: pointer; }
#infoBtn { background: var(--bg3); border: 1px solid var(--accent2); color: var(--accent2); border-radius: 7px; padding: 6px 16px; font-size: .9rem; cursor: pointer; }
#infoBtn:hover { background: rgba(41,182,246,.12); }

/* Legende über den Karten */
.legend { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
.legend-title { font-size: .85rem; color: var(--dim); margin-bottom: 8px; }
.legend-item { font-size: .84rem; display: flex; align-items: center; gap: 9px; margin: 4px 0; }
.chip { flex: none; width: 30px; height: 16px; border-radius: 999px; }
.chip-master { background: var(--accent); }
.chip-preset { background: var(--ok); }

#infoModal .panel { position: relative; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: min(780px, 92vw); max-height: 86vh; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,.5); margin: 0; }

#infoModal .mhead h2 { color: var(--accent); font-size: 1.2rem; letter-spacing: 1px; margin: 0; }
#infoClose { background: transparent; border: 1px solid var(--border); color: var(--dim); border-radius: 7px; padding: 4px 12px; font-size: 1rem; cursor: pointer; }
#infoClose:hover { color: var(--text); border-color: var(--dim); }
#infoModal .mbody { padding: 16px 22px 22px; overflow-y: auto; }

.info-page { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; margin-bottom: 8px; }
.info-page b { color: var(--accent); font-size: .9rem; letter-spacing: .5px; }
.info-page p { margin: 3px 0 0; color: var(--dim); font-size: .87rem; }

/* Karten-Kopf: Master-Wrap + Verschiebe-Buttons */
.masterwrap { display: inline-flex; align-items: center; gap: 8px; flex: none; }
.masterwrap .mlabel { font-size: .68rem; font-weight: 700; letter-spacing: .8px; color: var(--dim); text-transform: uppercase; }
.movebtns { display: inline-flex; gap: 4px; flex: none; }

.movebtns button:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
.movebtns button:disabled { opacity: .3; cursor: default; }

/* Preset-Zeile + Auto-Ping-Extra */

.featextra { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin: 2px 0 6px; display: flex; flex-direction: column; gap: 8px; }
.featextra .hint { margin: 0; }
input.numin { width: 70px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 8px; font-size: .9rem; }

/* Seiten-Karten */
#pages { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
.card {

.card.off { opacity: .55; }
.card.on { border-color: #3d5a3f; }
.card > .head {
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;

.card > .head .num {

.card.off > .head .num { background: #39424f; color: var(--dim); }
.card > .head .title { font-weight: 600; letter-spacing: .5px; flex: 1; }

.row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }

input[type="range"] { flex: 2; accent-color: var(--accent); min-width: 110px; }

.hint { color: var(--dim); font-size: .78rem; font-style: italic; }

  display: flex; gap: 12px; align-items: center; justify-content: center;

button {

button.primary { background: var(--accent); color: #10151c; }
button.primary:hover { filter: brightness(1.12); }
button.ghost {
  background: transparent; color: var(--accent2);

}
button.ghost:hover { background: rgba(41,182,246,.12); }
button.small { padding: 6px 14px; font-size: .85rem; }
#pageCount { color: var(--dim); font-size: .85rem; }
#pageCount b { color: var(--accent); }
footer { text-align: center; color: var(--dim); font-size: .8rem; padding: 20px; }
a { color: var(--accent2); }
</style>
</head>

    if ( digit_num == 6 ) { line_oled( sx, sy, sx, sy + 8, 1, 1 ); line_oled( sx, sy + 8, sx + 4, sy + 8, 1, 1 ); line_oled( sx + 4, sy + 8, sx + 4, sy + 4, 1, 1 ); line_oled( sx + 4, sy + 4, sx, sy + 4, 1, 1 ); }
    if ( digit_num == 7 ) { line_oled( sx, sy, sx + 4, sy, 1, 1 ); line_oled( sx + 4, sy, sx + 4, sy + 8, 1, 1 ); }
    if ( digit_num == 8 ) { rect_oled( sx, sy, 5, 9, 0, 1 ); line_oled( sx, sy + 4, sx + 4, sy + 4, 1, 1 ); }
    if ( digit_num == 9 ) { rect_oled( sx, sy, 5, 5, 0, 1 ); line_oled( sx + 4, sy, sx + 4, sy + 8, 1, 1 ); }
}

function draw_big_digit() {
    if ( digit_num == 0 ) { rect_oled( d_x, d_y, 15, 25, 0, 1 ); rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x, d_y, 3, 25, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); }
    if ( digit_num == 1 ) rect_oled( d_x + 6, d_y, 4, 25, 1, 1 );
    if ( digit_num == 2 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 12, 1, 1 ); rect_oled( d_x, d_y + 12, 3, 12, 1, 1 ); }
    if ( digit_num == 3 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); }
    if ( digit_num == 4 ) { rect_oled( d_x, d_y, 3, 12, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); }
    if ( digit_num == 5 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x, d_y, 3, 12, 1, 1 ); rect_oled( d_x + 12, d_y + 12, 3, 12, 1, 1 ); }
    if ( digit_num == 6 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x, d_y, 3, 25, 1, 1 ); rect_oled( d_x + 12, d_y + 12, 3, 12, 1, 1 ); }
    if ( digit_num == 7 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); }
    if ( digit_num == 8 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x, d_y, 3, 25, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); }
    if ( digit_num == 9 ) { rect_oled( d_x, d_y, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 11, 15, 3, 1, 1 ); rect_oled( d_x, d_y + 22, 15, 3, 1, 1 ); rect_oled( d_x, d_y, 3, 12, 1, 1 ); rect_oled( d_x + 12, d_y, 3, 25, 1, 1 ); }
}

function DrawButtonIcon() {
    if ( icon_btn == XB1_UP ) { line_oled( sx + 3, sy + 6, sx + 3, sy, 1, 1 ); line_oled( sx, sy + 3, sx + 3, sy, 1, 1 ); line_oled( sx + 6, sy + 3, sx + 3, sy, 1, 1 ); }
    else if ( icon_btn == XB1_DOWN ) { line_oled( sx + 3, sy, sx + 3, sy + 6, 1, 1 ); line_oled( sx, sy + 3, sx + 3, sy + 6, 1, 1 ); line_oled( sx + 6, sy + 3, sx + 3, sy + 6, 1, 1 ); }
    else if ( icon_btn == XB1_LEFT ) { line_oled( sx + 6, sy + 3, sx, sy + 3, 1, 1 ); line_oled( sx, sy + 3, sx + 3, sy, 1, 1 ); line_oled( sx, sy + 3, sx + 3, sy + 6, 1, 1 ); }
    else if ( icon_btn == XB1_RIGHT ) { line_oled( sx, sy + 3, sx + 6, sy + 3, 1, 1 ); line_oled( sx + 6, sy + 3, sx + 3, sy, 1, 1 ); line_oled( sx + 6, sy + 3, sx + 3, sy + 6, 1, 1 ); }
    else if ( icon_btn == XB1_A ) { if(tog_ps5) draw_btn_X(); else draw_btn_A(); }
    else if ( icon_btn == XB1_B ) { if(tog_ps5) draw_btn_CIRCLE(); else draw_btn_B(); }
    else if ( icon_btn == XB1_X ) { if(tog_ps5) draw_btn_SQUARE(); else draw_btn_X(); }
    else if ( icon_btn == XB1_Y ) { if(tog_ps5) draw_btn_TRIANGLE(); else draw_btn_Y(); }
    else if ( icon_btn == XB1_LB ) { draw_L(); sx = sx + 6; if(tog_ps5) { digit_num = 1; draw_medium_digit(); } else draw_btn_B(); }
    else if ( icon_btn == XB1_RB ) { draw_R(); sx = sx + 6; if(tog_ps5) { digit_num = 1; draw_medium_digit(); } else draw_btn_B(); }
    else if ( icon_btn == XB1_LS ) { draw_L(); sx = sx + 6; digit_num = 3; draw_medium_digit(); }
    else if ( icon_btn == XB1_RS ) { draw_R(); sx = sx + 6; digit_num = 3; draw_medium_digit(); }
    else if ( icon_btn == XB1_VIEW ) { rect_oled( sx, sy + 2, 6, 4, 0, 1 ); }
    else if ( icon_btn == XB1_MENU ) { line_oled( sx, sy + 2, sx + 6, sy + 2, 1, 1 ); line_oled( sx, sy + 4, sx + 6, sy + 4, 1, 1 ); line_oled( sx, sy + 6, sx + 6, sy + 6, 1, 1 ); }
}
`;

const TRIGGER_BTNS = ['XB1_UP', 'XB1_DOWN', 'XB1_LEFT', 'XB1_RIGHT', 'XB1_A', 'XB1_B', 'XB1_X', 'XB1_Y', 'XB1_LB', 'XB1_RB', 'XB1_LS', 'XB1_RS', 'XB1_VIEW', 'XB1_MENU'];

// ---------------------------------------------------------------------------
// Fragment-Bausteine. ctx = { I, has, hasFeat, feats, cfg, N }
//   I[id]      → neuer page_index des Moduls
//   has(id)    → Seite enthalten?
//   hasFeat(id)→ Feature auf der FEATURES-Seite enthalten?
//   feats      → Liste der gewählten Feature-IDs (kanonische Reihenfolge)
//   N          → Anzahl Seiten
// ---------------------------------------------------------------------------
const FRAG = {};

// ---- Menü-Bedienung: Eingaben nullen (edit mode) ----
FRAG.editZero = ctx => {
  let s = '';
  if (ctx.has('smart')) s += `            if ( page_index == ${ctx.I.smart} ) {\n                set_val( XB1_RX, 0 ); set_val( XB1_RY, 0 ); set_val( RESET_BTN, 0 );\n            }\n\n`;
  if (ctx.has('aim')) s += `            if ( page_index == ${ctx.I.aim} ) { set_val( XB1_X, 0 ); }\n`;
  if (ctx.has('snaphook')) s += `            if ( page_index == ${ctx.I.snaphook} ) { set_val( XB1_X, 0 ); }\n`;
  if (ctx.has('dontshoot')) s += `            if ( page_index == ${ctx.I.dontshoot} ) { set_val( XB1_X, 0 ); set_val( XB1_B, 0 ); set_val( RESET_BTN, 0 ); }\n`;
  return s;
};

// ---- feat_max-Berechnung für die FEATURES-Seite ----
FRAG.featMaxCode = ctx => {
  const n = ctx.feats.length;
  if (ctx.hasFeat('autoping')) {
    return `if ( tog_autoping ) feat_max = ${n}; else feat_max = ${n - 1};`;
  }
  return `feat_max = ${n - 1};`;
};

// ---- Up/Down-Navigation der Untermenüs + generisches Wert-Ändern ----
FRAG.editSubNav = ctx => {
  const blocks = [];
  if (ctx.has('features')) {
    blocks.push(`if ( page_index == ${ctx.I.features} ) {
                ${FRAG.featMaxCode(ctx)}
                if ( event_press( XB1_UP ) ) { feature_idx = feature_idx - 1; if ( feature_idx < 0 ) feature_idx = feat_max; }
                if ( event_press( XB1_DOWN ) ) { feature_idx = feature_idx + 1; if ( feature_idx > feat_max ) feature_idx = 0; }
            }`);
  }
  if (ctx.has('dropjump')) {
    blocks.push(`if ( page_index == ${ctx.I.dropjump} ) {
                if ( tog_dropshot || tog_jumpshot ) dj_feat_max = 3; else dj_feat_max = 2;
                if ( event_press( XB1_UP ) ) { dj_idx = dj_idx - 1; if ( dj_idx < 0 ) dj_idx = dj_feat_max; }
                if ( event_press( XB1_DOWN ) ) { dj_idx = dj_idx + 1; if ( dj_idx > dj_feat_max ) dj_idx = 0; }
            }`);
  }
  // generisches Hoch/Runter für Wert-Seiten
  const condParts = [];
  if (ctx.has('snaphook')) condParts.push(`page_index != ${ctx.I.snaphook}`);
  if (ctx.has('dontshoot')) condParts.push(`page_index != ${ctx.I.dontshoot}`);
  condParts.push('!fsh_edit_mode', '!ds_btn_edit_mode');
  const sm = ctx.has('smart');
  const up = sm
    ? `if ( page_index == ${ctx.I.smart} ) math_temp = -1; else math_temp = 1;\n                    ModifyValue();\n                    if ( page_index == ${ctx.I.smart} ) text_timer = 0;`
    : `math_temp = 1;\n                    ModifyValue();`;
  const down = sm
    ? `if ( page_index == ${ctx.I.smart} ) math_temp = 1; else math_temp = -1;\n                    ModifyValue();\n                    if ( page_index == ${ctx.I.smart} ) text_timer = 0;`
    : `math_temp = -1;\n                    ModifyValue();`;
  blocks.push(`if ( ${condParts.join(' && ')} ) {
                if ( event_press( XB1_UP ) ) {
                    ${up}
                }
                if ( event_press( XB1_DOWN ) ) {
                    ${down}
                }
            }`);
  return '            ' + blocks.join('\n            else ') + '\n';
};

// ---- Seitenspezifische Menü-Handler ----

  let s = '';

            if ( page_index == ${ctx.I.smart} ) {

// GetCurrentToggle-Block der FEATURES-Seite
FRAG.featGetToggle = ctx => {
  const F = ctx.feats;
  if (ctx.hasFeat('autoping')) {
    const withPing = F.slice(1).map((f, k) => `            if ( feature_idx == ${k + 2} ) ${FEAT_GET[f]}`).join('\n');
    const noPing = F.slice(1).map((f, k) => `            if ( feature_idx == ${k + 1} ) ${FEAT_GET[f]}`).join('\n');
    return `    if ( page_index == ${ctx.I.features} ) {
        if ( feature_idx == 0 ) return tog_autoping;
        if ( tog_autoping ) {
            if ( feature_idx == 1 ) ${FEAT_GET.pingcd}
${withPing}
        } else {
${noPing}
        }
    }
`;
  }
  const chain = F.map((f, k) => `        if ( feature_idx == ${k} ) ${FEAT_GET[f]}`).join('\n');
  return `    if ( page_index == ${ctx.I.features} ) {\n${chain}\n    }\n`;
};

// ToggleCurrentMod-Block der FEATURES-Seite
FRAG.featToggleMod = ctx => {
  const F = ctx.feats;
  if (ctx.hasFeat('autoping')) {
    const withPing = F.slice(1).map((f, k) => `            if ( feature_idx == ${k + 2} ) ${FEAT_TOGGLE[f]}`).join('\n');
    const noPing = F.slice(1).map((f, k) => `            if ( feature_idx == ${k + 1} ) ${FEAT_TOGGLE[f]}`).join('\n');
    return `    if ( page_index == ${ctx.I.features} ) {
        if ( feature_idx == 0 ) ${FEAT_TOGGLE.autoping}
        if ( tog_autoping ) {
            if ( feature_idx == 1 ) ${FEAT_TOGGLE.pingcd}
${withPing}
        } else {
${noPing}
        }
    }
`;
  }
  const chain = F.map((f, k) => `        if ( feature_idx == ${k} ) ${FEAT_TOGGLE[f]}`).join('\n');
  return `    if ( page_index == ${ctx.I.features} ) {\n${chain}\n    }\n`;
};

const DRAW_TITLE = {

  snaphook: (i, ctx) => ctx.hasFeat('gunswap')

        else { sx = 30; draw_F(); sx = sx + 7; draw_A(); sx = sx + 7; draw_S(); sx = sx + 7; draw_T(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_S(); sx = sx + 7; draw_N(); sx = sx + 7; draw_A(); sx = sx + 7; draw_P(); }

  dontshoot: i => `    if ( page_index == ${i} ) { sx = 20; draw_D(); sx = sx + 7; draw_O(); sx = sx + 7; draw_N(); sx = sx + 7; draw_T(); sx = sx + 5; draw_HYP(); sx = sx + 5; draw_S(); sx = sx + 7; draw_H(); sx = sx + 7; draw_O(); sx = sx + 7; draw_O(); sx = sx + 7; draw_T(); }`,

// ---- OLED-Seitenkörper (DrawFinalMenu) ----
function bigDigitBody(i, dx, dx10) {
  return `    if ( page_index == ${i} ) {
        d_val = GetCurrentVal(); d_y = 20;

        if ( d_val == 10 ) {
            digit_num = 1;
            d_x = ${dx10};
            draw_big_digit();
            digit_num = 0;
            d_x = d_x + 20;
            draw_big_digit();
        } else {
            digit_num = d_val;
            d_x = ${dx};
            draw_big_digit();
        }
    }`;
}

const DRAW_BODY = {
  recoil: i => `    if ( page_index == ${i} ) {
        d_val = val_recoil; d_y = 20;
        if ( d_val < 0 ) {
            d_val = abs( d_val );
            int_p = d_val / 2;
            if ( int_p == 10 ) d_x = 0; else d_x = 10;
            rect_oled( d_x, d_y + 11, 6, 3, 1, 1 );
        } else {
            int_p = d_val / 2;
        }

        frac_p = ( d_val % 2 ) * 5;

        if ( int_p == 10 ) {
            digit_num = 1; d_x = 8; draw_big_digit();
            digit_num = 0; d_x = 25; draw_big_digit();
            d_x = 42;
        } else {
            digit_num = int_p; d_x = 18; draw_big_digit();
            d_x = 35;
        }

        if ( frac_p > 0 ) {
            rect_oled( d_x, d_y + 21, 2, 2, 1, 1 );
            digit_num = 5; sx = d_x + 4; sy = d_y + 14; draw_medium_digit();
        }
    }`,
  smart: i => `    if ( page_index == ${i} ) {
        line_oled( 22, 14, 22, 50, 1, 1 ); line_oled( 4, 32, 40, 32, 1, 1 );
        cx = 22 + ( smart_x * 4 ) / 5; cy = 32 + ( val_recoil * 4 ) / 5;
        line_oled( 22, 32, cx, cy, 1, 1 ); rect_oled( cx - 2, cy - 2, 5, 5, 0, 1 );
        if ( text_timer == 0 ) {
            sx = 50; sy = 17; draw_X(); sx = 60; d_val = smart_x;
            if ( d_val < 0 ) { line_oled( sx, sy + 4, sx + 3, sy + 4, 1, 1 ); sx = sx + 5; d_val = abs( d_val ); }
            int_p = d_val / 2; frac_p = ( d_val % 2 ) * 5;
            digit_num = int_p;
            if ( int_p == 10 ) { digit_num = 1; draw_medium_digit(); sx = sx + 7; digit_num = 0; }
            draw_medium_digit();
            if ( frac_p > 0 ) { sx = sx + 6; rect_oled( sx, sy + 7, 2, 2, 1, 1 ); sx = sx + 3; digit_num = 5; draw_medium_digit(); }

            sx = 50; sy = 37; draw_Y(); sx = 60; d_val = val_recoil;
            if ( d_val < 0 ) { line_oled( sx, sy + 4, sx + 3, sy + 4, 1, 1 ); sx = sx + 5; d_val = abs( d_val ); }
            int_p = d_val / 2; frac_p = ( d_val % 2 ) * 5;
            digit_num = int_p;
            if ( int_p == 10 ) { digit_num = 1; draw_medium_digit(); sx = sx + 7; digit_num = 0; }
            draw_medium_digit();
            if ( frac_p > 0 ) { sx = sx + 6; rect_oled( sx, sy + 7, 2, 2, 1, 1 ); sx = sx + 3; digit_num = 5; draw_medium_digit(); }
        }
    }`,
  aim: i => bigDigitBody(i, 10, 0),
  roll: i => bigDigitBody(i, 45, 35),
  light: i => bigDigitBody(i, 45, 35),
  rapidfire: i => bigDigitBody(i, 25, 15),
  snaphook: i => `    if ( page_index == ${i} ) {
        sx = 13; sy = 27; draw_L(); sx = sx + 8;
        if (tog_ps5) { digit_num = 2; draw_medium_digit(); } else { draw_T(); }
        sx = sx + 8; draw_PLUS_BIG();

        box_x = 40; box_y = 22; rect_oled( box_x, box_y, 25, 18, 0, 1 );
        if ( fsh_edit_mode ) { fsh_blink_timer = ( fsh_blink_timer + get_rtime() ) % 400;
        if ( fsh_blink_timer < 200 ) { rect_oled( box_x + 2, box_y + 2, 21, 14, 1, 1 ); } }
        else { sx = box_x + 8; sy = box_y + 5; icon_btn = ssh_trigger; DrawButtonIcon(); }

        box_x = 76; box_y = 38; rect_oled( box_x, box_y, 34, 13, 0, 1 );
        if ( tog_ps5 ) {
            sx = box_x + 8; sy = box_y + 2; draw_P(); sx = sx + 7; draw_S(); sx = sx + 7; digit_num = 5; draw_medium_digit();
        } else {
            sx = box_x + 4; sy = box_y + 2; draw_X(); sx = sx + 7; draw_B(); sx = sx + 7; draw_O(); sx = sx + 7; draw_X();
        }
    }`,
  dontshoot: i => `    if ( page_index == ${i} ) {
        if ( ds_time_edit_mode ) {
            sx = 2; sy = 25; if (tog_ps5) draw_btn_SQUARE(); else draw_btn_X();
            sx = 11; digit_num = ds_delay / 100;
            if ( digit_num > 0 ) { draw_medium_digit(); sx = sx + 6; }
            digit_num = ( ds_delay / 10 ) % 10; draw_medium_digit(); sx = sx + 6; digit_num = 0; draw_medium_digit();

            sx = 35; sy = 25; if (tog_ps5) draw_btn_CIRCLE(); else draw_btn_B();
            sx = 44; digit_num = ds_hold / 100;
            if ( digit_num > 0 ) { draw_medium_digit(); sx = sx + 6; }
            digit_num = ( ds_hold / 10 ) % 10; draw_medium_digit(); sx = sx + 6; digit_num = 0; draw_medium_digit();
        } else {
            sx = 5; sy = 27; draw_H(); sx = sx + 6; draw_O(); sx = sx + 6; draw_L(); sx = sx + 6; draw_D();
            box_x = 35; box_y = 22; rect_oled( box_x, box_y, 25, 18, 0, 1 );
            if ( ds_btn_edit_mode ) { fsh_blink_timer = ( fsh_blink_timer + get_rtime() ) % 400;
            if ( fsh_blink_timer < 200 ) { rect_oled( box_x + 2, box_y + 2, 21, 14, 1, 1 ); } }
            else { sx = box_x + 8; sy = box_y + 5; icon_btn = ds_trigger; DrawButtonIcon(); }
        }
    }`,
  features: (i, ctx) => {
    const F = ctx.feats;
    let map, names = '';
    if (ctx.hasFeat('autoping')) {
      map = `        if ( feature_idx == 0 ) math_temp = 0;
        else if ( tog_autoping && feature_idx == 1 ) math_temp = 99;
        else if ( tog_autoping ) math_temp = feature_idx - 1;
        else math_temp = feature_idx;`;
      names = `        if ( math_temp == 99 ) { ${FEAT_NAME_DRAW.pingcd} }\n`;
    } else {
      map = `        math_temp = feature_idx;`;
    }
    names += F.map((f, k) => `        if ( math_temp == ${k} ) { ${FEAT_NAME_DRAW[f]} }`).join('\n');
    return `    if ( page_index == ${i} ) {
        icon_btn = XB1_UP; sx = 5; sy = 20; DrawButtonIcon();
        icon_btn = XB1_DOWN; sx = 5; sy = 38; DrawButtonIcon();
        sy = 27;
${map}
${names}
    }`;
  },
  dropjump: i => `    if ( page_index == ${i} ) {
        icon_btn = XB1_UP; sx = 5; sy = 20; DrawButtonIcon();
        icon_btn = XB1_DOWN; sx = 5; sy = 38; DrawButtonIcon();
        sy = 27;
        // Reihenfolge: 0=DROP, 1=JUMP, 2=SPAM (ds oder js), 3=COMBO-TOG
        if ( dj_idx == 0 ) math_temp = 0;
        else if ( dj_idx == 1 ) math_temp = 2;
        else if ( dj_idx == 2 ) {
            if ( tog_dropshot ) math_temp = 1;
            else if ( tog_jumpshot ) math_temp = 3;
            else math_temp = 4;
        }
        else math_temp = 4;
        if ( math_temp == 0 ) { sx = 14; draw_D(); sx = sx + 7; draw_R(); sx = sx + 7; draw_O(); sx = sx + 7; draw_P(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_S(); sx = sx + 7; draw_H(); sx = sx + 7; draw_O(); sx = sx + 7; draw_T(); }
        if ( math_temp == 1 ) { sx = 14; draw_D(); sx = sx + 7; draw_S(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_S(); sx = sx + 7; draw_P(); sx = sx + 7; draw_A(); sx = sx + 7; draw_M(); }
        if ( math_temp == 2 ) { sx = 14; draw_J(); sx = sx + 7; draw_U(); sx = sx + 7; draw_M(); sx = sx + 7; draw_P(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_S(); sx = sx + 7; draw_H(); sx = sx + 7; draw_O(); sx = sx + 7; draw_T(); }
        if ( math_temp == 3 ) { sx = 14; draw_J(); sx = sx + 7; draw_S(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_S(); sx = sx + 7; draw_P(); sx = sx + 7; draw_A(); sx = sx + 7; draw_M(); }
        if ( math_temp == 4 ) { sx = 14; draw_C(); sx = sx + 7; draw_O(); sx = sx + 7; draw_M(); sx = sx + 7; draw_B(); sx = sx + 7; draw_O(); sx = sx + 7; draw_HYP(); sx = sx + 7; draw_T(); sx = sx + 7; draw_O(); sx = sx + 7; draw_G(); }
    }`,
};

// ---- DrawFinalMenu komplett zusammensetzen ----
function buildDrawFinalMenu(ctx) {
  const { I, has, hasFeat, N } = ctx;
  const parts = [];
  parts.push(`combo DrawFinalMenu {
    cls_oled( 0 ); rect_oled( 0, 0, SCREEN_W, SCREEN_H, 0, 1 );
    sy = 3;`);
  // Titel
  for (const m of MODULES) if (has(m.id)) parts.push(DRAW_TITLE[m.id](I[m.id], ctx));
  parts.push('');
  // Körper
  for (const m of MODULES) if (has(m.id)) parts.push(DRAW_BODY[m.id](I[m.id], ctx));
  // Checkbox + ON/OFF für Standard-Seiten
  const boxPages = ['recoil', 'aim', 'roll', 'light', 'rapidfire', 'features', 'dropjump'].filter(has);
  if (boxPages.length) {
    const cond = boxPages.map(id => `page_index == ${I[id]}`).join(' || ');
    const fd = ['features', 'dropjump'].filter(has);
    const fdCond = fd.map(id => `page_index == ${I[id]}`).join(' || ');
    const boxPos = fd.length
      ? `        if ( ${fdCond} ) { box_y = 24; box_x = 110; }
        else { box_y = 16; box_x = 95; }`
      : `        box_y = 16; box_x = 95;`;
    const syLine = fd.length
      ? `            if ( ${fdCond} ) sy = 27; else sy = box_y + 3;`
      : `            sy = box_y + 3;`;
    const onSx = fd.length ? `if ( ${fdCond} ) sx = 85; else sx = 78;` : `sx = 78;`;
    const offSx = fd.length ? `if ( ${fdCond} ) sx = 80; else sx = 70;` : `sx = 70;`;
    const specials = [];
    if (has('features') && hasFeat('autoping')) {
      specials.push(`if ( page_index == ${I.features} && math_temp == 99 ) {
                if ( val_ping_cd == 0 ) {
                    sx = 80; draw_O(); sx = sx + 7; draw_F(); sx = sx + 7; draw_F();
                } else {
                    sx = 80; digit_num = val_ping_cd; draw_medium_digit();
                    sx = sx + 7; draw_S(); sx = sx + 7; draw_E(); sx = sx + 7; draw_C();
                }
            }`);
    }
    if (has('dropjump')) {
      specials.push(`if ( page_index == ${I.dropjump} && math_temp == 1 ) {
                if ( val_ds_spam == 0 ) {
                    sx = 80; draw_O(); sx = sx + 7; draw_F(); sx = sx + 7; draw_F();
                } else {
                    sx = 85; digit_num = val_ds_spam; draw_medium_digit();
                }
            }`);
      specials.push(`if ( page_index == ${I.dropjump} && math_temp == 3 ) {
                if ( val_js_spam == 0 ) {
                    sx = 80; draw_O(); sx = sx + 7; draw_F(); sx = sx + 7; draw_F();
                } else {
                    sx = 85; digit_num = val_js_spam; draw_medium_digit();
                }
            }`);
    }
    specials.push(`if ( GetCurrentToggle() ) {
                ${onSx}
                draw_O(); sx = sx + 7; draw_N();
            } else {
                ${offSx}
                draw_O(); sx = sx + 7; draw_F(); sx = sx + 7; draw_F();
            }`);
    parts.push(`
    if ( ${cond} ) {
${boxPos}

        show_text = 1;
        if ( show_text ) {
${syLine}
            ${specials.join('\n            else ')}
        }

        rect_oled( box_x, box_y, 14, 14, 0, 1 );
        if ( GetCurrentToggle() ) {
            line_oled( box_x + 3, box_y + 7, box_x + 6, box_y + 10, 1, 1 );
            line_oled( box_x + 6, box_y + 10, box_x + 11, box_y + 3, 1, 1 );
        }
        else {
            line_oled( box_x + 3, box_y + 3, box_x + 10, box_y + 10, 1, 1 );
            line_oled( box_x + 10, box_y + 3, box_x + 3, box_y + 10, 1, 1 );
        }
    }`);
  }
  // SMART RECOIL: Checkbox mit Text-Timer
  if (has('smart')) {
    parts.push(`
    if ( page_index == ${I.smart} ) {
        box_y = 16; box_x = 95;
        show_text = 1; if ( text_timer > 0 ) { text_timer = text_timer - get_rtime(); show_text = 1; } else { show_text = 0; }
        if ( show_text ) { sy = box_y + 3; if ( GetCurrentToggle() ) { sx = 78; draw_O(); sx = 86; draw_N(); } else { sx = 70; draw_O(); sx = 78; draw_F(); sx = 86; draw_F(); } }
        rect_oled( box_x, box_y, 14, 14, 0, 1 );
        if ( GetCurrentToggle() ) { line_oled( box_x + 3, box_y + 7, box_x + 6, box_y + 10, 1, 1 ); line_oled( box_x + 6, box_y + 10, box_x + 11, box_y + 3, 1, 1 ); }
        else { line_oled( box_x + 3, box_y + 3, box_x + 10, box_y + 10, 1, 1 ); line_oled( box_x + 10, box_y + 3, box_x + 3, box_y + 10, 1, 1 ); }
    }`);
  }
  // SNAP HOOK / DONT SHOOT: Checkbox
  const sd = ['snaphook', 'dontshoot'].filter(has);
  if (sd.length) {
    parts.push(`
    if ( ${sd.map(id => `page_index == ${I[id]}`).join(' || ')} ) {
        box_y = 22; box_x = 95;
        show_text = 1; sy = box_y + 3;
        if ( GetCurrentToggle() ) { sx = 78; draw_O(); sx = 86; draw_N(); } else { sx = 70; draw_O(); sx = 78; draw_F(); sx = 86; draw_F(); }
        rect_oled( box_x, box_y, 14, 14, 0, 1 );
        if ( GetCurrentToggle() ) { line_oled( box_x + 3, box_y + 7, box_x + 6, box_y + 10, 1, 1 ); line_oled( box_x + 6, box_y + 10, box_x + 11, box_y + 3, 1, 1 ); }
        else { line_oled( box_x + 3, box_y + 3, box_x + 10, box_y + 10, 1, 1 ); line_oled( box_x + 10, box_y + 3, box_x + 3, box_y + 10, 1, 1 ); }
    }`);
  }
  // ADS+RT-Checkbox (Recoil / Smart / Aim)
  const adsPages = ['recoil', 'smart', 'aim'].filter(has);
  if (adsPages.length) {
    const fills = [];
    if (has('recoil')) fills.push(`        if ( page_index == ${I.recoil} && tog_rec_fire ) box_fill = 1;`);
    if (has('smart')) fills.push(`        if ( page_index == ${I.smart} && tog_smart_fire ) box_fill = 1;`);
    if (has('aim')) fills.push(`        if ( page_index == ${I.aim} && tog_aim_fire ) box_fill = 1;`);
    parts.push(`
    if ( ${adsPages.map(id => `page_index == ${I[id]}`).join(' || ')} ) {
        box_y = 34; box_x = 95;
        if ( show_text ) { sx = 52; sy = 36; draw_A(); sx = sx + 7; draw_D(); sx = sx + 7; draw_S(); sx = sx + 6; draw_PLUS_BIG(); sx = sx + 8; draw_R(); sx = sx + 7; if (tog_ps5) { digit_num = 2; draw_medium_digit(); } else { draw_T(); } }
        rect_oled( box_x, box_y, 14, 14, 0, 1 );
        box_fill = 0;
${fills.join('\n')}
        if ( box_fill ) { line_oled( box_x + 3, box_y + 7, box_x + 6, box_y + 10, 1, 1 ); line_oled( box_x + 6, box_y + 10, box_x + 11, box_y + 3, 1, 1 ); }
        else { line_oled( box_x + 3, box_y + 3, box_x + 10, box_y + 10, 1, 1 ); line_oled( box_x + 10, box_y + 3, box_x + 3, box_y + 10, 1, 1 ); }
    }`);
  }
  // AIM ASSIST: Geschwindigkeitsanzeige
  if (has('aim')) {
    parts.push(`
    if ( page_index == ${I.aim} ) {
        sx = 38; sy = 19;
        draw_S(); sx = sx + 7; draw_P(); sx = sx + 7; draw_D(); sx = sx + 8;
        if ( val_aa_speed == 10 ) { digit_num = 1; draw_medium_digit(); sx = sx + 6; digit_num = 0; draw_medium_digit(); }
        else { digit_num = val_aa_speed; draw_medium_digit(); }
    }`);
  }
  // RAPID FIRE: LED-Box
  if (has('rapidfire')) {
    parts.push(`
    if ( page_index == ${I.rapidfire} ) {
        box_y = 34; box_x = 95;
        if ( show_text ) { sx = 67; sy = 36; draw_L(); sx = 76; draw_E(); sx = 85; draw_D(); }
        rect_oled( box_x, box_y, 14, 14, 0, 1 );
        sx = box_x + 3; sy = box_y + 3;
        if ( rf_led_mode == 0 ) { line_oled( sx, sy, sx + 7, sy + 7, 1, 1 ); line_oled( sx + 7, sy, sx, sy + 7, 1, 1 ); }
        if ( rf_led_mode == 1 ) { sx = sx + 1; sy = sy - 1; draw_R(); } if ( rf_led_mode == 2 ) { sx = sx + 1; sy = sy - 1; draw_G(); }
        if ( rf_led_mode == 3 ) { sx = sx + 1; sy = sy - 1; draw_B(); } if ( rf_led_mode == 4 ) { if ( ( rgb_timer % 500 ) < 250 ) rect_oled( box_x + 2, box_y + 2, 10, 10, 1, 1 ); }
    }`);
  }
  // Wert-Balken unten
  const barExcl = ['smart', 'snaphook', 'dontshoot', 'features'].filter(has).map(id => `page_index != ${I[id]}`);
  const barCond = barExcl.length ? barExcl.join(' && ') : '1';
  const barVal = has('recoil')
    ? `        if ( page_index == ${I.recoil} ) d_val = val_recoil / 2; else d_val = GetCurrentVal();`
    : `        d_val = GetCurrentVal();`;
  parts.push(`
    if ( ${barCond} ) {
        rect_oled( 40, 50, 86, 5, 0, 1 );
${barVal}
        if ( d_val != 0 ) {
            if ( d_val < 0 ) {
                math_temp = abs( d_val ) * 8;
                rect_oled( 126 - math_temp, 52, math_temp, 1, 1, 1 );
            } else {
                rect_oled( 42, 52, d_val * 8, 1, 1, 1 );
            }
        }
    }`);
  // Seiten-Punkte (max. 9 passen neben die Seitenzahl)
  const D = Math.min(N, 9);
  const px = 30 + Math.floor((96 - (D * 10 - 2)) / 2);
  const dots = [];
  for (let i = 0; i < D; i++) {
    dots.push(`    if ( page_index == ${i} ) rect_oled( ${px + i * 10}, 58, 8, 5, 1, 1 ); else rect_oled( ${px + i * 10 + 2}, 59, 4, 3, 0, 1 );`);
  }
  parts.push('\n' + dots.join('\n'));
  // M-Modus-Anzeige oben links
  parts.push(`
    sx = 2; sy = 2; draw_M(); sx = sx + 7;
    if ( profile_mode == 0 ) digit_num = 1; if ( profile_mode == 1 ) digit_num = 2; if ( profile_mode == 2 ) digit_num = 5;
    draw_medium_digit();

    if ( profile_mode != 0 ) {
        sx = 5; sy = 14;
        if ( profile_mode == 1 ) digit_num = m2_prof; if ( profile_mode == 2 ) digit_num = m5_prof;
        draw_medium_digit();
    }`);
  // Seitenzahl unten links (+ Sub-Nummern)
  if (N === 10) {
    parts.push(`
    // Seitennummer unten links.
    if ( page_index == 9 ) {
        sx = 0; sy = 48; digit_num = 1; draw_page_digit();
        sx = 8; sy = 48; draw_page_digit_zero();
    } else {
        sx = 4; sy = 48; digit_num = page_index + 1; draw_page_digit();
    }`);
  } else {
    parts.push(`
    // Seitennummer unten links.
    sx = 4; sy = 48; digit_num = page_index + 1; draw_page_digit();`);
  }
  if (has('features')) {
    parts.push(`    // Sub-Nummer "X.Y" auf der Features-Seite
    if ( page_index == ${I.features} ) {
        rect_oled( 16, 60, 2, 2, 1, 1 );
        sx = 20; sy = 53; digit_num = feature_idx + 1;
        draw_medium_digit();
    }`);
  }
  if (has('dropjump')) {
    const isTen = I.dropjump === 9;
    parts.push(`    // Sub-Nummer "X.Y" auf der Drop/Jump-Seite
    if ( page_index == ${I.dropjump} ) {
        rect_oled( ${isTen ? 20 : 16}, 60, 2, 2, 1, 1 );
        sx = ${isTen ? 23 : 20}; sy = 53; digit_num = dj_idx + 1; draw_medium_digit();
    }`);
  }
  parts.push(`
    wait( 100 );
}`);
  return parts.join('\n');
}

// ---- Dispatch-Funktionen ----
function buildGetCurrentVal(ctx) {
  const map = { recoil: 'val_recoil', aim: 'val_aim', roll: 'val_jump', light: 'val_rapid', rapidfire: 'val_fire' };
  const lines = Object.keys(map).filter(ctx.has).map(id => `    if ( page_index == ${ctx.I[id]} ) return ${map[id]};`);
  return `function GetCurrentVal() {\n${lines.join('\n')}${lines.length ? '\n' : ''}    return 0;\n}`;
}

function buildGetCurrentToggle(ctx) {
  const map = { recoil: 'tog_recoil', smart: 'tog_smart', aim: 'tog_aim', roll: 'tog_jump', light: 'tog_rapid', rapidfire: 'tog_fire', snaphook: 'tog_ssh', dontshoot: 'tog_dontshoot' };
  let s = 'function GetCurrentToggle() {\n';
  for (const m of MODULES) {
    if (!ctx.has(m.id)) continue;
    if (map[m.id]) s += `    if ( page_index == ${ctx.I[m.id]} ) return ${map[m.id]};\n`;
    else if (m.id === 'features') s += FRAG.featGetToggle(ctx);
    else if (m.id === 'dropjump') s += `    if ( page_index == ${ctx.I.dropjump} ) {
        if ( dj_idx == 0 ) return tog_dropshot;
        if ( dj_idx == 1 ) return tog_jumpshot;
        if ( dj_idx == 2 ) {
            if ( tog_dropshot ) { if ( val_ds_spam > 0 ) return 1; else return 0; }
            if ( tog_jumpshot ) { if ( val_js_spam > 0 ) return 1; else return 0; }
            return tog_dj_combo;
        }
        if ( dj_idx == 3 ) return tog_dj_combo;
    }
`;
  }
  s += '    return 0;\n}';
  return s;
}

function buildToggleCurrentMod(ctx) {
  const { I, has } = ctx;
  let s = 'function ToggleCurrentMod() {\n';
  if (has('recoil')) s += `    if ( page_index == ${I.recoil} ) { if ( tog_recoil ) tog_recoil = 0; else { tog_recoil = 1;${has('smart') ? ' tog_smart = 0;' : ''} } }\n`;
  if (has('smart')) s += `    if ( page_index == ${I.smart} ) { text_timer = 2000; if ( tog_smart ) tog_smart = 0; else { tog_smart = 1;${has('recoil') ? ' tog_recoil = 0;' : ''} } }\n`;
  if (has('aim')) s += `    if ( page_index == ${I.aim} ) { if ( tog_aim ) tog_aim = 0; else tog_aim = 1; }\n`;
  if (has('roll')) s += `    if ( page_index == ${I.roll} ) { if ( tog_jump ) tog_jump = 0; else tog_jump = 1; }\n`;
  if (has('light')) s += `    if ( page_index == ${I.light} ) { if ( tog_rapid ) tog_rapid = 0; else tog_rapid = 1; }\n`;
  if (has('rapidfire')) s += `    if ( page_index == ${I.rapidfire} ) { if ( tog_fire ) tog_fire = 0; else tog_fire = 1; }\n`;
  if (has('snaphook')) s += `    if ( page_index == ${I.snaphook} ) { if ( tog_ssh ) tog_ssh = 0; else tog_ssh = 1; }\n`;
  if (has('dontshoot')) s += `    if ( page_index == ${I.dontshoot} ) { if ( tog_dontshoot ) tog_dontshoot = 0; else tog_dontshoot = 1; }\n`;
  if (has('features')) s += FRAG.featToggleMod(ctx);
  if (has('dropjump')) s += `    if ( page_index == ${I.dropjump} ) {
        if ( dj_idx == 0 ) {
            if ( tog_dropshot ) tog_dropshot = 0;
            else { tog_dropshot = 1; tog_jumpshot = 0; }
        }
        else if ( dj_idx == 1 ) {
            if ( tog_jumpshot ) tog_jumpshot = 0;
            else { tog_jumpshot = 1; tog_dropshot = 0; }
        }
        else if ( dj_idx == 2 ) {
            if ( tog_dropshot ) { val_ds_spam = val_ds_spam + 1; if ( val_ds_spam > 5 ) val_ds_spam = 0; }
            else if ( tog_jumpshot ) { val_js_spam = val_js_spam + 1; if ( val_js_spam > 5 ) val_js_spam = 0; }
            else { if ( tog_dj_combo ) tog_dj_combo = 0; else tog_dj_combo = 1; }
        }
        else if ( dj_idx == 3 ) { if ( tog_dj_combo ) tog_dj_combo = 0; else tog_dj_combo = 1; }
    }
`;
  s += '    SaveProfile();\n';
  const sync = ['snaphook', 'dontshoot', 'features'].filter(has).map(id => `page_index == ${I[id]}`);
  if (sync.length) s += `    if ( ${sync.join(' || ')} ) SyncM2Toggles();\n`;
  s += '}';
  return s;
}

function buildModifyValue(ctx) {
  const { I, has } = ctx;
  const lines = [];
  const rs = ['recoil', 'smart'].filter(has).map(id => `page_index == ${I[id]}`);
  if (rs.length) lines.push(`    if ( ${rs.join(' || ')} ) { val_recoil = val_recoil + math_temp; if ( val_recoil > 20 ) val_recoil = 20; if ( val_recoil < -20 ) val_recoil = -20; SaveProfile(); }`);
  if (has('aim')) lines.push(`    if ( page_index == ${I.aim} ) { val_aim = val_aim + math_temp; if ( val_aim > 10 ) val_aim = 10; if ( val_aim < 0 ) val_aim = 0; SaveProfile(); }`);
  if (has('roll')) lines.push(`    if ( page_index == ${I.roll} ) { val_jump = val_jump + math_temp; if ( val_jump > 10 ) val_jump = 10; if ( val_jump < 0 ) val_jump = 0; SaveProfile(); }`);
  if (has('light')) lines.push(`    if ( page_index == ${I.light} ) { val_rapid = val_rapid + math_temp; if ( val_rapid > 10 ) val_rapid = 10; if ( val_rapid < 0 ) val_rapid = 0; SaveProfile(); }`);
  if (has('rapidfire')) lines.push(`    if ( page_index == ${I.rapidfire} ) { val_fire = val_fire + math_temp; if ( val_fire > 10 ) val_fire = 10; if ( val_fire < 0 ) val_fire = 0; SaveProfile(); }`);
  if (!lines.length) lines.push('    math_temp = 0;');
  return `function ModifyValue() {\n${lines.join('\n')}\n}`;
}

// ---- Seiten in der vom Nutzer gewählten Reihenfolge (cfg.order) ----
function orderedModules(cfg) {
  const order = Array.isArray(cfg.order) ? cfg.order : [];
  const byId = {};
  for (const m of MODULES) byId[m.id] = m;
  const out = [];
  const seen = {};
  for (const id of order) { if (byId[id] && !seen[id]) { out.push(byId[id]); seen[id] = 1; } }
  for (const m of MODULES) if (!seen[m.id]) out.push(m); // fehlende IDs kanonisch anhängen
  return out;
}

// ---- Konfigurations-Hash (EEPROM-Erstinitialisierung) ----
function configHash(cfg) {
  const s = JSON.stringify([cfg.pages, cfg.ps5, cfg.screensaver]);
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
  let out = (h % 32765) + 1;
  if (out === 3191) out += 1; // nie mit dem Original-Marker kollidieren
  return out;
}

// ---- Header-Kommentar ----
function buildHeader(cfg, ctx, hash) {
  const ver = cfg.version.join('.');
  const docs = MODULES.filter(m => ctx.has(m.id))
    .sort((a, b) => ctx.I[a.id] - ctx.I[b.id])
    .map(m => m.doc(ctx.I[m.id] + 1, ctx))
    .join('\n *\n');
  const today = new Date().toISOString().slice(0, 10);
  return `/*
 ==================================================================================
 * SCRIPT:       ARC RAIDERS - DADA EDITION (CUSTOM BUILD)
 * AUTHOR:       Dada
 * PLATFORM:     Cronus Zen (GPC)
 * VERSION:      v${ver} - erstellt mit dem DADA GPC BUILDER
 * BUILD:        ${today} / Config-ID ${hash} / ${ctx.N} Seite${ctx.N === 1 ? '' : 'n'}
 *
 * --- SCRIPT MANUAL & DETAILED FEATURES ---
 *
${docs}
 *
 * --- HOW TO NAVIGATE & CONFIGURE ---
 * - OPEN MENU: Hold LB/L1${ctx.hasFeat('flipped') ? ' (or LT/L2 if Flipped mode is ON)' : ''}. Release to save instantly!
 * - SWITCH PAGES: Use D-Pad Left or Right.
 * - TOGGLE MODS: Press A/Cross to turn the active Mod ON [V] or OFF [X].
 * - ADJUST VALUES: Use D-Pad UP/DOWN (+/- 0.5 steps) or Right Stick (RX/RY).
 *
 * --- PROFILE SYSTEM (See Top-Left OLED for active Mode) ---
 * -> Hold MENU BTN + Press PROFILE BTN (RB/R1) to cycle M-Modes.
 * - M1 (1 Profile): Standard mode. Weapon swap works normally.
 * - M2 (2 Profiles): Tap Y/Triangle to swap. Hold Y to holster (NO GUN).
 * > Press D-Pad Left for Pickaxe (AXE). Tap Y to unholster without profile swap!
 * - M5 (5 Profiles): Hold MENU BTN + tap Y/Triangle to cycle through 5 loadouts.
 *
 * SUPPORT / DISCORD:
 * ${cfg.discord}
 ==================================================================================
*/`;
}

// ---- Hauptfunktion: komplettes Script erzeugen ----
function generateGPC(cfg) {
  // FEATURES-Seite ohne Features fällt automatisch weg
  const featsSelected = FEATS.filter(f => cfg.pages.features.feats[f.id].on)
    .filter(f => f.id !== 'gunswap' || cfg.pages.snaphook.on)
    .map(f => f.id);
  const pageOn = id => id === 'features'
    ? (cfg.pages.features.on && featsSelected.length > 0)
    : cfg.pages[id].on;

  const sel = orderedModules(cfg).filter(m => pageOn(m.id));
  const I = {};
  sel.forEach((m, k) => { I[m.id] = k; });
  const ctx = {
    I,
    N: sel.length,
    has: id => Object.prototype.hasOwnProperty.call(I, id),
    feats: featsSelected,
    hasFeat: id => Object.prototype.hasOwnProperty.call(I, 'features') && featsSelected.includes(id),
    cfg,
  };
  const hash = configHash(cfg);
  const producers = ctx.has('dropjump') || ctx.has('snaphook') || ctx.has('dontshoot');
  const anyStick = ctx.has('aim') || ctx.has('recoil') || ctx.has('smart');

  const out = [];
  out.push(buildHeader(cfg, ctx, hash));
  out.push('');
  out.push(`define V_DIGIT_1 = ${cfg.version[0]};`);
  out.push(`define V_DIGIT_2 = ${cfg.version[1]};`);
  out.push(`define V_DIGIT_3 = ${cfg.version[2]};`);
  out.push('');
  out.push(`int FIRE_BTN;
int ADS_BTN;
int PING_BTN;
int MENU_BTN;
int PROF_BTN;

define RX_AXIS       = XB1_RX;
define RY_AXIS       = XB1_RY;
define TOGGLE_BTN    = XB1_A;
define SLIDE_BTN     = XB1_B;
define RAPID_BTN     = XB1_RIGHT;
define RESET_BTN     = XB1_RS;
define SCREEN_W      = 128;
define SCREEN_H      = 64;`);
  // Auto-Ping mit eigenem Max-Wert: Millisekunden pro Cooldown-Stufe.
  if (ctx.hasFeat('autoping') && (cfg.pages.features.feats.autoping.cdMax || 5) !== 5) {
    out.push(`define PING_CD_STEP  = ${Math.round((cfg.pages.features.feats.autoping.cdMax || 5) * 200)};`);
  }
  out.push('');
  if (ctx.has('aim')) out.push(GPC_TABLES);
  out.push(GPC_VARS);

  // --- init ---
  out.push(`init {
    if ( get_pvar( SPVAR_34, 0, 32767, 0 ) != ${hash} ) {
        set_pvar( SPVAR_34, ${hash} );
        profile_mode = 0; m2_prof = 1; m5_prof = 1; tog_ps5 = ${cfg.ps5 ? 1 : 0}; tog_flipped = ${ctx.hasFeat('flipped') && cfg.pages.features.feats.flipped.def ? 1 : 0};
        SaveSystem();

${buildInitDefaults(cfg, ctx)}

        active_prof = 1; SaveToRAM(); SaveToEEPROM();
        active_prof = 2; SaveToRAM(); SaveToEEPROM();
        active_prof = 3; SaveToRAM(); SaveToEEPROM();
        active_prof = 4; SaveToRAM(); SaveToEEPROM();
        active_prof = 5; SaveToRAM(); SaveToEEPROM();
        active_prof = 6; SaveToRAM(); SaveToEEPROM();
        active_prof = 7; SaveToRAM(); SaveToEEPROM();
        active_prof = 8; SaveToRAM(); SaveToEEPROM();

        active_prof = 1;
${GPC_INIT_LOAD}`);

  // --- main ---
  let main = `main {
    FIRE_BTN = XB1_RT; ADS_BTN = XB1_LT; PING_BTN = XB1_RB; MENU_BTN = XB1_LB; PROF_BTN = XB1_RB;

`;
  if (ctx.hasFeat('flipped')) main += `    if ( tog_flipped ) {

${GPC_M2_Y_LOGIC}`;

${FRAG.editSubNav(ctx)}${FRAG.editHandlers(ctx)}

            if ( notify_timer > 0 ) {
                show_display = 3;   // Notification hat Vorrang
            } else if ( profile_mode == 1 ) {
`;

`;

                ${cfg.screensaver ? 'if ( saver_timer < 2000 ) show_display = 1; else show_display = 0;' : 'show_display = 1;'}
            }

                    else { r = ( ( rgb_timer - 1000 ) * 100 / 500 ); g = 0; b = 100 - ( ( rgb_timer - 1000 ) * 100 / 500 ); }
                    set_rgb( r, g, b );
                } else {
                    led_pulse_timer = ( led_pulse_timer + get_rtime() ) % 600;
                    if ( led_pulse_timer < 300 ) { led_brightness = ( led_pulse_timer * 100 ) / 300; }
                    else { led_brightness = ( ( 600 - led_pulse_timer ) * 100 ) / 300; }
                    if ( rf_led_mode == 1 ) set_rgb( led_brightness, 0, 0 );
                    if ( rf_led_mode == 2 ) set_rgb( 0, led_brightness, 0 );

${idleLed}

`;

`;
  main += `        else { cls_oled( 0 ); }
    }
}`;
  out.push(main);

  // --- Funktionen ---
  out.push('\n\n// ==================================================================================');
  out.push('// --- FUNCTIONS ---');

  out.push('');
  out.push(buildGetCurrentToggle(ctx));
  out.push('');
  out.push(GPC_PERSIST);
  out.push(buildToggleCurrentMod(ctx));
  out.push('');
  out.push(buildModifyValue(ctx));
  out.push('');
  out.push(GPC_DRAW_FUNCS);

  // --- Combos ---
  out.push(GPC_COMBO_NOTIFY_SYS);
  out.push(FRAG.combos(ctx));
  out.push(GPC_COMBO_GAMEPLAY_STATUS);
  if (producers) out.push(GPC_COMBO_DRAW_NOTIFY);
  out.push(GPC_COMBO_BOOT);
  out.push(buildDrawFinalMenu(ctx));
  out.push('');

  return out.join('\n').replace(/\n{4,}/g, '\n\n\n');
}

function t(key, vars) {
  const L = (typeof cfg !== 'undefined' && cfg && cfg.lang) || 'en';
  let s = (I18N[L] && I18N[L][key]);
  if (s == null) s = I18N.en[key];
  if (s == null) s = key;
  if (vars) for (const k in vars) s = s.split('{' + k + '}').join(vars[k]);
  return s;
}

const LS_KEY = 'dadaGpcBuilderCfg_v2';
const VERSION = [4, 0, 0];               // fest v40.0 (nicht editierbar)
const DISCORD = 'discord.gg/W825gUj6Nn'; // feste Konstante (nur Footer + Script-Header)
const LANGS = ['en', 'de', 'pt', 'es', 'ru', 'tr', 'ar'];
const CANON_ORDER = ['recoil', 'smart', 'aim', 'roll', 'light', 'rapidfire', 'snaphook', 'dontshoot', 'features', 'dropjump'];

function defaultCfg() {
  return {
    version: VERSION.slice(),
    discord: DISCORD,
    lang: 'en',
    order: CANON_ORDER.slice(),
    screensaver: true,
    ps5: 0,
    pages: {
      recoil:    { on: true, tog: 1, val: 8, adsOnly: 1 },
      smart:     { on: true, tog: 0, x: 0, adsOnly: 1 },

      roll:      { on: true, tog: 1, val: 4 },
      light:     { on: true, tog: 1, val: 7 },
      rapidfire: { on: true, tog: 0, val: 6, led: 1 },
      snaphook:  { on: true, tog: 1, trigger: 'XB1_MENU' },
      dontshoot: { on: true, tog: 0, trigger: 'XB1_X', delay: 150, hold: 250 },
      features:  { on: true, feats: {
        autoping: { on: true, def: 0, cd: 0, cdMax: 5 },
        hairtrig: { on: true, def: 1 },

      } },
      dropjump:  { on: true, drop: 0, jump: 0, combo: 0, dsSpam: 0, jsSpam: 0 },
    },
  };
}

let cfg = loadCfg();

function loadCfg() {
  const base = defaultCfg();
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) mergeCfg(base, JSON.parse(raw));
  } catch (e) { /* defekter Speicher → Defaults */ }
  return base;
}
function mergeCfg(base, saved) {
  if (!saved || typeof saved !== 'object') return;
  // version & discord sind fest — gespeicherte Werte werden ignoriert.
  if (typeof saved.lang === 'string' && LANGS.includes(saved.lang)) base.lang = saved.lang;
  if (Array.isArray(saved.order)) {
    const valid = saved.order.filter(id => CANON_ORDER.includes(id));
    // nur übernehmen, wenn genau die bekannten IDs (ohne Duplikate) enthalten sind
    const uniq = [...new Set(valid)];
    if (uniq.length === CANON_ORDER.length) base.order = uniq;
  }
  if (typeof saved.screensaver === 'boolean') base.screensaver = saved.screensaver;
  if (saved.ps5 === 0 || saved.ps5 === 1) base.ps5 = saved.ps5;
  if (saved.pages && typeof saved.pages === 'object') {
    for (const id of Object.keys(base.pages)) {
      const s = saved.pages[id];
      if (!s || typeof s !== 'object') continue;
      if (id === 'features') {
        if (typeof s.on === 'boolean') base.pages.features.on = s.on;
        if (s.feats) for (const fid of Object.keys(base.pages.features.feats)) {
          const sf = s.feats[fid];
          if (sf && typeof sf === 'object') Object.assign(base.pages.features.feats[fid], sf);
        }
      } else {
        Object.assign(base.pages[id], s);
      }
    }
  }
  // Sicherheits-Klemmen
  const ap = base.pages.features.feats.autoping;
  ap.cdMax = Math.min(30, Math.max(1, parseInt(ap.cdMax, 10) || 5));
  if (ap.cd < 0 || ap.cd > 5) ap.cd = 0;
  base.version = VERSION.slice();
  base.discord = DISCORD;
}
function saveCfg() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(cfg)); } catch (e) { /* voll/blockiert → ignorieren */ }
}

// Options-Sets für <select> (Labels sprachabhängig)
function optionSet(name) {
  if (name === 'trigger') return TRIGGER_BTNS.map(id => [id, t('btn.' + id)]);
  if (name === 'led') return [0, 1, 2, 3, 4].map(n => [n, t('led.' + n)]);
  return [];
}

// ---- DOM-Helfer ----
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
const stateTxt = on => on ? t('sw.on') : t('sw.off');
// variant: 'master' (orange, Seite ins Script) | 'preset' (grün, Startzustand)
function mkSwitch(checked, variant, onChange, disabled) {
  const w = el(`<label class="switch${variant ? ' switch--' + variant : ''}"><input type="checkbox"${checked ? ' checked' : ''}${disabled ? ' disabled' : ''}><span class="knob"></span></label>`);
  w.querySelector('input').addEventListener('change', e => onChange(e.target.checked));
  return w;
}
// Volle Zeile: Beschriftung + (grüner) Preset-Switch + Status-Text
function presetRow(labelText, checked, onChange) {
  const row = el(`<div class="row row-sw"><label>${labelText}</label><span class="swwrap"></span></div>`);
  const wrap = row.querySelector('.swwrap');
  const st = el(`<span class="statetxt ${checked ? 'is-on' : 'is-off'}">${stateTxt(checked)}</span>`);
  const sw = mkSwitch(checked, 'preset', v => {
    st.textContent = stateTxt(v);
    st.className = 'statetxt ' + (v ? 'is-on' : 'is-off');
    onChange(v);
  });
  wrap.appendChild(sw); wrap.appendChild(st);
  return row;
}

// ---- Seiten-Karten rendern (in cfg.order-Reihenfolge) ----
const cardEls = {};
function renderCards() {
  const wrap = document.getElementById('pages');
  wrap.innerHTML = '';
  const order = orderedModules(cfg).map(m => m.id);
  order.forEach((id, pos) => {
    const m = MODULES.find(x => x.id === id);
    const p = cfg.pages[m.id];
    const card = el(`<div class="card"><div class="head">
        <span class="masterwrap">
          <label class="switch switch--master"><input type="checkbox" data-role="pageon"${p.on ? ' checked' : ''}><span class="knob"></span></label>
          <span class="mlabel">${t('sw.inScript')}</span>
          <span class="statetxt ${p.on ? 'is-on' : 'is-off'}" data-role="masterstate">${stateTxt(p.on)}</span>
        </span>
        <span class="num" data-role="num">–</span>
        <span class="title">${m.name}<small>${t('tag.' + m.id)}</small></span>
        <span class="movebtns">
          <button data-role="up" title="${t('move.up')}"${pos === 0 ? ' disabled' : ''}>▲</button>
          <button data-role="down" title="${t('move.down')}"${pos === order.length - 1 ? ' disabled' : ''}>▼</button>
        </span>
      </div><div class="body"></div></div>`);
    const body = card.querySelector('.body');
    const chk = card.querySelector('[data-role=pageon]');
    const mstate = card.querySelector('[data-role=masterstate]');
    chk.addEventListener('change', e => {
      p.on = e.target.checked;
      mstate.textContent = stateTxt(p.on);
      mstate.className = 'statetxt ' + (p.on ? 'is-on' : 'is-off');
      onChange();
    });
    // Klick auf den Kopf (außer Buttons/Switch) schaltet den Master-Toggle
    card.querySelector('.head').addEventListener('click', e => {
      if (e.target.closest('button, .switch, .movebtns')) return;
      chk.checked = !chk.checked;
      chk.dispatchEvent(new Event('change'));
    });
    card.querySelector('[data-role=up]').addEventListener('click', e => { e.stopPropagation(); movePage(m.id, -1); });
    card.querySelector('[data-role=down]').addEventListener('click', e => { e.stopPropagation(); movePage(m.id, 1); });
    if (m.id === 'features') renderFeatureBody(body);
    else renderFieldBody(body, m.id);
    wrap.appendChild(card);
    cardEls[m.id] = card;
  });
}

function movePage(id, dir) {
  const ord = orderedModules(cfg).map(m => m.id);
  const i = ord.indexOf(id);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= ord.length) return;
  [ord[i], ord[j]] = [ord[j], ord[i]];
  cfg.order = ord;
  renderCards();
  onChange();
}

function renderFieldBody(body, id) {
  const p = cfg.pages[id];
  let hasPreset = false;
  for (const f of CARD_FIELDS[id]) {
    if (f.type === 'switch') {
      hasPreset = true;
      body.appendChild(presetRow(t(f.lk), !!p[f.key], v => {
        p[f.key] = v ? 1 : 0;
        applyExclusions(id, f.key);
        if (id === 'recoil' && f.key === 'tog') refreshBody('smart');
        if (id === 'smart' && f.key === 'tog') refreshBody('recoil');
        if (id === 'dropjump' && (f.key === 'drop' || f.key === 'jump')) refreshBody('dropjump');
        onChange();
      }));
    } else if (f.type === 'range') {
      const fmt = f.fmt || String;
      const row = el(`<div class="row"><label>${t(f.lk)}</label>
        <input type="range" min="${f.min}" max="${f.max}" step="${f.step || 1}" value="${p[f.key]}">
        <span class="val">${fmt(p[f.key])}</span></div>`);
      const inp = row.querySelector('input');
      inp.addEventListener('input', () => {
        p[f.key] = parseInt(inp.value, 10);
        row.querySelector('.val').textContent = fmt(p[f.key]);
        onChange();
      });
      body.appendChild(row);
    } else if (f.type === 'select') {
      const opts = optionSet(f.opt).map(([v, l]) => `<option value="${v}"${String(p[f.key]) === String(v) ? ' selected' : ''}>${l}</option>`).join('');
      const row = el(`<div class="row"><label>${t(f.lk)}</label><select>${opts}</select></div>`);
      row.querySelector('select').addEventListener('change', e => {
        const raw = e.target.value;
        p[f.key] = /^\d+$/.test(raw) ? parseInt(raw, 10) : raw;
        onChange();
      });
      body.appendChild(row);
    }
  }
  if (hasPreset) body.appendChild(el(`<div class="hint">${t('sw.presetHint')}</div>`));
}

// Sekunden-Anzeige einer Cooldown-Stufe k (1..5) bei gegebenem Max
function cdSecLabel(k, cdMax) {
  const s = k * cdMax / 5;
  const txt = Number.isInteger(s) ? String(s) : s.toFixed(1);
  return t('feat.cd.step', { sec: txt });
}

function renderFeatureBody(body) {
  const feats = cfg.pages.features.feats;
  body.appendChild(el(`<div class="hint">${t('feat.hint')}</div>`));
  for (const F of FEATS) {
    const fc = feats[F.id];
    const row = el(`<div class="featrow" data-feat="${F.id}">
        <label class="switch switch--master"><input type="checkbox" data-role="on"${fc.on ? ' checked' : ''}><span class="knob"></span></label>
        <span class="fname">${F.name}<small>${t('feat.' + F.id)}</small></span>
        <span class="deflabel">${t('feat.standard')}</span>
      </div>`);
    row.querySelector('[data-role=on]').addEventListener('change', e => {
      fc.on = e.target.checked;
      if (F.id === 'autoping') refreshBody('features');
      onChange();
    });
    const st = el(`<span class="statetxt ${fc.def ? 'is-on' : 'is-off'}">${stateTxt(!!fc.def)}</span>`);
    const sw = mkSwitch(!!fc.def, 'preset', v => {
      fc.def = v ? 1 : 0;
      st.textContent = stateTxt(v); st.className = 'statetxt ' + (v ? 'is-on' : 'is-off');
      onChange();
    });
    row.appendChild(sw); row.appendChild(st);
    body.appendChild(row);

    // Auto-Ping: Cooldown-Erklärung, Start-Stufe und eigener Max-Wert
    if (F.id === 'autoping' && fc.on) {
      const box = el(`<div class="featextra"></div>`);
      box.appendChild(el(`<div class="hint">${t('feat.cd.explain')}</div>`));
      const maxRow = el(`<div class="row"><label>${t('feat.cd.maxLabel')}</label>
        <input type="number" class="numin" min="1" max="30" value="${fc.cdMax}"></div>`);
      const maxInp = maxRow.querySelector('input');
      maxInp.addEventListener('change', () => {
        let v = parseInt(maxInp.value, 10);
        if (!(v >= 1)) v = 5; if (v > 30) v = 30;
        fc.cdMax = v; refreshBody('features'); onChange();
      });
      box.appendChild(maxRow);
      const cdOpts = [0, 1, 2, 3, 4, 5].map(v =>
        `<option value="${v}"${fc.cd === v ? ' selected' : ''}>${v === 0 ? t('feat.cd.off') : cdSecLabel(v, fc.cdMax)}</option>`).join('');
      const cdRow = el(`<div class="row"><label>Auto-Ping CD</label><select>${cdOpts}</select></div>`);
      cdRow.querySelector('select').addEventListener('change', e => { fc.cd = parseInt(e.target.value, 10); onChange(); });
      box.appendChild(cdRow);
      if (fc.cdMax !== 5) box.appendChild(el(`<div class="hint">${t('feat.cd.note')}</div>`));
      body.appendChild(box);
    }
  }
}

function refreshBody(id) {
  const body = cardEls[id].querySelector('.body');
  body.innerHTML = '';
  if (id === 'features') renderFeatureBody(body);
  else renderFieldBody(body, id);
}

// Gegenseitiger Ausschluss von Standard-Toggles
function applyExclusions(id, key) {
  const p = cfg.pages;
  if (id === 'recoil' && key === 'tog' && p.recoil.tog) p.smart.tog = 0;
  if (id === 'smart' && key === 'tog' && p.smart.tog) p.recoil.tog = 0;
  if (id === 'dropjump' && key === 'drop' && p.dropjump.drop) p.dropjump.jump = 0;
  if (id === 'dropjump' && key === 'jump' && p.dropjump.jump) p.dropjump.drop = 0;
}

// ---- Effektive Seitenliste (wie im Generator, in cfg.order-Reihenfolge) ----
function effectivePages() {
  const featsOn = FEATS.filter(f => cfg.pages.features.feats[f.id].on)
    .filter(f => f.id !== 'gunswap' || cfg.pages.snaphook.on);
  return orderedModules(cfg).filter(m => m.id === 'features'
    ? (cfg.pages.features.on && featsOn.length > 0)
    : cfg.pages[m.id].on);
}

// ---- Validierung / Hinweise ----
function validate() {
  const warns = [];
  const p = cfg.pages;
  const sel = effectivePages();
  if (sel.length === 0) warns.push(t('w.noPage'));
  const featsOn = FEATS.filter(f => p.features.feats[f.id].on);
  if (p.features.on && featsOn.length === 0) warns.push(t('w.featEmpty'));
  if (p.features.feats.gunswap.on && !p.snaphook.on) warns.push(t('w.gunswapNoSnap'));
  if (p.smart.on && !p.recoil.on) warns.push(t('w.smartNoRecoil'));
  if (p.features.on && p.features.feats.flipped.on && p.features.feats.flipped.def) warns.push(t('w.flippedDefault'));
  if (!cfg.screensaver) warns.push(t('w.noSaver'));
  return warns;
}

// ---- Anzeige aktualisieren ----
let previewTimer = null;
function onChange() {
  saveCfg();
  updateCards();
  updateWarnings();
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 150);
}

function updateCards() {
  const sel = effectivePages();
  const nums = {};
  sel.forEach((m, k) => { nums[m.id] = k + 1; });
  for (const m of MODULES) {
    const card = cardEls[m.id];
    if (!card) continue;
    const on = !!nums[m.id];
    card.classList.toggle('on', on);
    card.classList.toggle('off', !on);
    card.querySelector('[data-role=num]').textContent = on ? '#' + nums[m.id] : '—';
    const pageChk = card.querySelector('[data-role=pageon]');
    if (m.id === 'features') {
      pageChk.checked = cfg.pages.features.on;
      const ms = card.querySelector('[data-role=masterstate]');
      ms.textContent = stateTxt(cfg.pages.features.on);
      ms.className = 'statetxt ' + (cfg.pages.features.on ? 'is-on' : 'is-off');
    }
  }
  // Gun-Swap-Zeile ausgrauen, wenn Snap Hook fehlt
  const gsRow = cardEls.features.querySelector('[data-feat=gunswap]');
  if (gsRow) gsRow.classList.toggle('disabled', !cfg.pages.snaphook.on);
  document.getElementById('pageCount').innerHTML = t('pageCount', { n: sel.length, total: MODULES.length });
  document.getElementById('footerDiscord').textContent = cfg.discord;
}

function updateWarnings() {
  const warns = validate();
  const panel = document.getElementById('warnPanel');
  const box = document.getElementById('warnings');
  panel.style.display = warns.length ? '' : 'none';
  box.innerHTML = '';
  for (const w of warns) box.appendChild(el(`<div class="w">⚠ ${w}</div>`));
  document.getElementById('download').disabled = effectivePages().length === 0;
}

function updatePreview() {
  const stats = document.getElementById('previewStats');
  const ta = document.getElementById('preview');
  if (effectivePages().length === 0) {
    stats.textContent = t('preview.none');
    ta.value = '';
    return;
  }
  try {
    const code = generateGPC(cfg);
    const bytes = new Blob([code]).size;
    stats.textContent = t('preview.stats', { lines: code.split('\n').length, kb: (bytes / 1024).toFixed(1), id: configHash(cfg) });
    ta.value = code;
  } catch (err) {
    stats.textContent = 'Error: ' + err.message;
    ta.value = String(err.stack || err);
  }
}

// ---- Globale Felder ----
function wireGlobals() {
  const ps5 = document.getElementById('ps5');
  ps5.value = String(cfg.ps5);
  ps5.onchange = () => { cfg.ps5 = parseInt(ps5.value, 10); onChange(); };
  const saver = document.getElementById('screensaver');
  saver.checked = cfg.screensaver;
  saver.onchange = () => { cfg.screensaver = saver.checked; onChange(); };
}

// ---- Sprache anwenden: alle statischen Texte + Karten neu ----
function applyLang(lang) {
  cfg.lang = LANGS.includes(lang) ? lang : 'en';
  saveCfg();
  document.documentElement.lang = cfg.lang;
  document.documentElement.dir = cfg.lang === 'ar' ? 'rtl' : 'ltr';
  const set = (id, txt) => { const e = document.getElementById(id); if (e) e.textContent = txt; };
  set('hSub', t('app.sub'));
  const steps = document.getElementById('steps');
  steps.innerHTML = [1, 2, 3, 4].map(i => `<div><b>${i}</b> ${t('steps.' + i)}</div>`).join('');
  set('hGlobals', t('globals.h'));
  set('lblPlatform', t('globals.platform'));
  set('lblSaver', t('globals.saver'));
  set('warnHead', t('warn.h'));
  set('prevHeadTxt', t('preview.h'));
  set('infoBtn', t('info.btn'));
  set('footerBase', t('footer.base'));
  set('download', t('btn.download'));
  set('exportPreset', t('btn.export'));
  set('importPreset', t('btn.import'));
  set('resetCfg', t('btn.reset'));
  const ta = document.getElementById('preview');
  document.getElementById('togglePreview').textContent = (ta.style.display === 'none') ? t('preview.show') : t('preview.hide');
  document.getElementById('langSel').value = cfg.lang;
  document.getElementById('legend').innerHTML =
    `<div class="legend-title">${t('legend.title')}</div>` +
    `<div class="legend-item"><span class="chip chip-master"></span> ${t('legend.master')}</div>` +
    `<div class="legend-item"><span class="chip chip-preset"></span> ${t('legend.preset')}</div>`;
  renderCards();
  wireGlobals();
  onChange();
}

// ---- Info-Modal ----
function buildInfo() {
  const body = document.getElementById('infoBody');
  const nl2 = s => s.split('\n').map(x => `<p>${x}</p>`).join('');
  let html = `<p class="info-intro">${t('info.intro')}</p>`;
  html += `<h3>${t('info.navTitle')}</h3>${nl2(t('info.nav'))}`;
  html += `<h3>${t('info.profTitle')}</h3>${nl2(t('info.prof'))}`;
  html += `<h3>${t('info.pagesTitle')}</h3>`;
  for (const m of MODULES) html += `<div class="info-page"><b>${m.name}</b><p>${t('ip.' + m.id)}</p></div>`;
  body.innerHTML = html;
  document.getElementById('infoTitle').textContent = t('info.title');
  document.getElementById('infoClose').title = t('info.close');
}
function openInfo() { buildInfo(); document.getElementById('infoModal').style.display = 'flex'; }
function closeInfo() { document.getElementById('infoModal').style.display = 'none'; }

// ---- Aktionen ----
function downloadBlob(name, text, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: mime }));
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

function wireActions() {
  document.getElementById('download').addEventListener('click', () => {
    if (effectivePages().length === 0) return;
    const code = generateGPC(cfg);
    const v = cfg.version.join('');
    downloadBlob(`DADA_RAW_CUSTOM_v${v}_${configHash(cfg)}.gpc`, code, 'text/plain');
  });
  document.getElementById('exportPreset').addEventListener('click', () => {
    downloadBlob('dada-gpc-preset.json', JSON.stringify(cfg, null, 2), 'application/json');
  });
  const fileInp = document.getElementById('importFile');
  document.getElementById('importPreset').addEventListener('click', () => fileInp.click());
  fileInp.addEventListener('change', () => {
    const file = fileInp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const base = defaultCfg();
        mergeCfg(base, JSON.parse(reader.result));
        cfg = base;
        saveCfg();
        applyLang(cfg.lang);
      } catch (e) {
        alert(t('import.err', { msg: e.message }));
      }
      fileInp.value = '';
    };
    reader.readAsText(file);
  });
  document.getElementById('resetCfg').addEventListener('click', () => {
    if (!confirm(t('reset.confirm'))) return;
    const keepLang = cfg.lang;
    cfg = defaultCfg();
    cfg.lang = keepLang;
    saveCfg();
    applyLang(cfg.lang);
  });
  const tp = document.getElementById('togglePreview');
  tp.addEventListener('click', () => {
    const ta = document.getElementById('preview');
    const show = ta.style.display === 'none';
    ta.style.display = show ? '' : 'none';
    tp.textContent = show ? t('preview.hide') : t('preview.show');
  });
  document.getElementById('langSel').addEventListener('change', e => applyLang(e.target.value));
  document.getElementById('infoBtn').addEventListener('click', openInfo);
  document.getElementById('infoClose').addEventListener('click', closeInfo);
  document.getElementById('infoBackdrop').addEventListener('click', closeInfo);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInfo(); });
}

// ---- Start ----
wireActions();
applyLang(cfg.lang);
</script>
</body>
</html>
